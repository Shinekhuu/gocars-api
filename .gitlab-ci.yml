stages:
  - build
  - deploy

variables:
  APP_NAME: gocars-api
  APP_DIR: "/home/api"
  SERVICE_NAME: gocars-api   # systemd service name

build:
  stage: build
  tags: ["shell"]
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  script:
    - go version
    - go mod download
    - go build -o $APP_NAME
  artifacts:
    paths:
      - $APP_NAME

deploy:
  stage: deploy
  tags: ["shell"]
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  before_script:
    - echo "Setting up SSH..."

    - New-Item -ItemType Directory -Force -Path $env:USERPROFILE\.ssh

    - $SSH_PRIVATE_KEY | Out-File -Encoding ascii "$env:USERPROFILE\.ssh\id_rsa"
    - icacls "$env:USERPROFILE\.ssh\id_rsa" /inheritance:r /grant:r "$($env:USERNAME):(R)"

    - |
      if (-not $env:DEPLOY_HOST) {
        Write-Host "Error: DEPLOY_HOST is not set"
        exit 1
      }

    - ssh-keyscan -H $env:DEPLOY_HOST >> "$env:USERPROFILE\.ssh\known_hosts"
  script:
    - echo "Deploying $APP_NAME to $DEPLOY_HOST..."
    - scp $APP_NAME $DEPLOY_USER@$DEPLOY_HOST:$APP_DIR/$APP_NAME.new
    - |
      ssh $DEPLOY_USER@$DEPLOY_HOST "
        set -e

        # Atomic install: set owner to deploy user and permissions
        sudo install -o root -g root -m 755 $APP_DIR/$APP_NAME.new $APP_DIR/$APP_NAME

        # Restart systemd service
        sudo systemctl daemon-reload
        sudo systemctl restart $SERVICE_NAME
        sudo systemctl status $SERVICE_NAME --no-pager
      "