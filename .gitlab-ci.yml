stages:
  - build
  - deploy

variables:
  APP_NAME: gocars-api
  APP_DIR: "/home/api"
  SERVICE_NAME: gocars-api   # systemd service name

build:
  stage: build
  tags: ["shell"]
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  script:
    - go version
    - go mod download
    - $env:CGO_ENABLED="0"
    - $env:GOOS="linux"
    - $env:GOARCH="amd64"
    - go build -o $APP_NAME
  artifacts:
    paths:
      - $APP_NAME

deploy:
  stage: deploy
  tags: ["shell"]
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

  before_script:
    - echo "Setting up SSH..."
    - New-Item -ItemType Directory -Force -Path $env:USERPROFILE\.ssh
    - $SSH_PRIVATE_KEY | Out-File -Encoding ascii "$env:USERPROFILE\.ssh\id_rsa"

  script:
    - scp -o StrictHostKeyChecking=no $APP_NAME "${env:DEPLOY_USER}@${env:DEPLOY_HOST}:${env:APP_DIR}/$APP_NAME.new"

    - |
      ssh -o StrictHostKeyChecking=no "${env:DEPLOY_USER}@${env:DEPLOY_HOST}" "
        set -e
        sudo install -o root -g root -m 755 ${env:APP_DIR}/$APP_NAME.new ${env:APP_DIR}/$APP_NAME
        sudo systemctl daemon-reload
        sudo systemctl restart ${env:SERVICE_NAME}
        sudo systemctl status ${env:SERVICE_NAME} --no-pager
      "